name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  workspace-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: metro-ops
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: metro-ops/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      # GitHub CI is expected to support tsx --test IPC. Restricted automation
      # should use pnpm run ci:restricted until shared moves off tsx or disables IPC.
      - run: pnpm run ci
